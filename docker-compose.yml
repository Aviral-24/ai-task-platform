version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ai_task_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=local_dev_secret_key
    depends_on:
      - mongodb
      - redis

  worker:
    build: ./worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_task_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend