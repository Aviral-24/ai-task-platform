apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: ai-task-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: your-docker-username/ai-worker:latest
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017/ai_task_platform"
            - name: REDIS_HOST
              value: "redis-service"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"